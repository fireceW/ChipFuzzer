## 放到 /etc/nginx/conf.d/chipfuzzer-api.conf （示例）
## 目标：把 https://js1.blockelite.cn/api/* 反代到本机 127.0.0.1:8088/api/*

server {
  listen 80;
  server_name js1.blockelite.cn;

  # 如果你已经有 HTTPS/证书/现有站点，请把下面 location 合并到你的 server block 里

  location /api/ {
    proxy_pass http://127.0.0.1:8088/api/;
    proxy_http_version 1.1;

    # SSE 关键：不要缓存、不要缓冲
    proxy_buffering off;
    proxy_cache off;
    add_header Cache-Control "no-cache";

    # 透传信息
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

